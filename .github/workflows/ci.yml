name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Type check
        run: python -m mypy

      - name: Run tests
        run: |
          python -m coverage erase
          while IFS= read -r test_file; do
            python -m coverage run --parallel-mode -m pytest "$test_file"
          done < <(find tests -maxdepth 1 -name 'test_*.py' | sort)
          python -m coverage combine

      - name: Report coverage
        if: always()
        run: |
          python -m coverage report
          python -m coverage xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml

  rdkit-smoke:
    name: RDKit smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies with RDKit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,rdkit]"

      - name: Verify RDKit import
        run: |
          python - <<'PY'
          from rdkit import Chem

          assert Chem.MolFromSmiles("CCO") is not None
          PY

      - name: Run RDKit smoke tests
        run: python -m pytest tests/test_core_rdkit_adapter.py -k real_rdkit_smoke

  package-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
          python scripts/verify_wheel.py dist/*.whl

      - name: Install wheel without source-tree imports
        run: |
          python -m venv /tmp/chemvas-wheel-smoke
          /tmp/chemvas-wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/chemvas-wheel-smoke/bin/python - <<'PY'
          from importlib.metadata import distribution
          from importlib.util import find_spec

          import chemvas
          import chemvas.ui
          from chemvas.bootstrap.application import main
          from chemvas.domain.document import MoleculeModel

          installed = distribution("chemvas")
          installed_files = {str(path) for path in installed.files or ()}
          console_scripts = {
              entry_point.name: entry_point.value
              for entry_point in installed.entry_points
              if entry_point.group == "console_scripts"
          }

          assert chemvas.__version__
          assert callable(main)
          assert MoleculeModel is not None
          assert "chemvas/adapters/qt/file_open_events.py" in installed_files
          assert console_scripts["chemvas"] == "chemvas.bootstrap.application:main"
          assert find_spec("core") is None
          assert find_spec("ui") is None
          PY

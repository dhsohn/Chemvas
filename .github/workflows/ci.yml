name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Run tests
        run: |
          python -m coverage erase
          while IFS= read -r test_file; do
            python -m coverage run --parallel-mode -m pytest "$test_file"
          done < <(find tests -maxdepth 1 -name 'test_*.py' | sort)
          python -m coverage combine

      - name: Report coverage
        if: always()
        run: |
          python -m coverage report
          python -m coverage xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml

  rdkit-smoke:
    name: RDKit smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies with RDKit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,rdkit]"

      - name: Verify RDKit import
        run: |
          python - <<'PY'
          from rdkit import Chem

          assert Chem.MolFromSmiles("CCO") is not None
          PY

      - name: Run RDKit smoke tests
        run: python -m pytest tests/test_core_rdkit_adapter.py -k real_rdkit_smoke

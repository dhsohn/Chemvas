name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a v* tag is pushed.
# No API token is stored: the pypi environment mints a short-lived token from
# GitHub's OIDC identity. See RELEASING.md for the one-time PyPI setup.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
          python scripts/verify_wheel.py dist/*.whl

      - name: Check package metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chemvas
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
